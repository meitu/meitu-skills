  # ══════════════════════════════════════════
  # ── 图片增强类 ────────────────────────────
  # ══════════════════════════════════════════

  - id: image-superres-enhance
    name: 图片超清（分场景）
    summary: 按内容类型（通用/商品/文档）自动选择最优超清算法，提升图片清晰度。
    description: "Image clarity enhancement/super-resolution upscaling with auto algorithm selection by content type, covering general superres, e-commerce product superres, text/document superres. `image_url` and `prompt` (image content description, e.g. \"e-commerce white-background product\" or \"scanned text document\") required. Key distinction: \"make clearer/HD\" → this tool; \"enlarge 2/4/8x\" → geometric transform. Prohibited: denoising, color optimization, low-light enhancement, video superres, geometric scaling."
    triggers:
      - 变清晰/超清/高清修复/画质提升/超分
