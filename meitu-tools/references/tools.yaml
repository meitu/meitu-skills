  - id: image-transform
    name: 图片变换
    summary: 图片几何变换（旋转/翻转/等比放大/缩小/画布扩展），不改变图片内容。
    description: "Image geometric transformation (no content changes), covering rotation/flip (-180°~180°), proportional upscale (2/4/8x), lossless proportional downscale, canvas expansion/outpainting (AI smart fill, can expand portrait-to-landscape or reverse, defaults to 3:4 ratio when unspecified). `image_url` required, per-scenario parameters as needed. Downscale target larger than original auto-converts to upscale, equal returns original; outpaint target smaller than original rejected. Key distinction: \"enlarge Nx/shrink to 800w\" → this tool; \"make clearer/HD/upscale to 4K\" → superres. Prohibited: GIF input, resolution-target superres, superres/quality repair, local rotation, image content editing, video canvas expansion, image cropping."
    triggers:
      - 旋转/顺时针/逆时针/翻转/镜像/转正/倒过来
      - 放大2倍/放大4倍/放大8倍/等比放大
      - 缩小到xxx/无损缩小/压缩尺寸
      - 扩图/扩大画布/改成16:9/竖版改横版/横版改竖版/outpaint/外延
    input:
      - type: image
        count: "1"
      - type: text
        count: "0..1"
        note: 扩展区域内容描述（画布扩展时可选）
    output:
      type: image
    params:
      - name: sub_api
        type: enum
        values: [image_transform_rotate, image_transform_upscale, image_transform_downscale, image_transform_extend]
        selection_rule: |
          旋转/翻转 → image_transform_rotate (api_v1_layer_flow_edit_rotate)
          等比放大（2x/4x/8x）→ image_transform_upscale (image_upscale_equal_proportion_edit)
          缩小 → image_transform_downscale (image_dldownscaling_edit)（目标大于原图时自动切换 upscale）
          扩图/改比例/outpaint → image_transform_extend (image_extension_layer_flow_filter)
    constraints:
      - 不支持 GIF 输入
      - rotate 范围 -180~180
      - sr_num 取值 2/4/8，非法值取最近合法值（3→2, 6→8）
      - canvas_extend 目标需大于原图，未指定尺寸/比例时默认 3:4
      - downscale 目标=原图 → 直接返回原图
    not_for:
      - GIF 动图输入 → 不支持
      - 超清画质提升 → image-superres-enhance
      - 放大到4K/2K/1080P（分辨率目标）→ image-superres-enhance
      - 修改图片内容 → image-edit
      - 视频画布扩展 → video-canvas-expand
    cli:
      requiredKeys: [image_url]
      optionalKeys: [rotate, flip_x, flip_y, sr_num, target_width, target_height, width, height, prompt]
      arrayKeys: []
      commandAliases: [transform, 图片变换, 旋转, 翻转, 镜像, 扩图, 等比放大]
      inputAliases:
        image: image_url
        图片: image_url
        图片url: image_url
        图片链接: image_url
        旋转角度: rotate
        角度: rotate
        水平翻转: flip_x
        垂直翻转: flip_y
        上下翻转: flip_y
        放大倍数: sr_num
        倍数: sr_num
        目标宽度: target_width
        目标高度: target_height
        宽: width
        宽度: width
        高: height
        高度: height
        提示词: prompt
        描述: prompt


