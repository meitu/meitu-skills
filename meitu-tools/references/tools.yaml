  # ══════════════════════════════════════════
  # ── 视频增强类 ────────────────────────────
  # ══════════════════════════════════════════

  - id: video-quality-enhance
    name: 视频画质修复
    summary: 视频画质修复，去模糊+降噪+补帧+暗部提亮，自适配人像/演唱会/动漫/夜景/商品全场景，不处理分辨率。
    description: "Comprehensive video quality repair (deblur/denoise/frame interpolation/shadow brightening), auto-adapting to portrait/concert/anime/night/product scenes. `video_url` and `prompt` (video content description) required; write \"general video\" when uncertain. Does not accept `target_resolution`, does not handle resolution/superres/upscale requests, does not process images."
    triggers:
      - 画质修复/全能修复/视频修复/整体修复
      - 综合修复/一键修复/变清晰/画面模糊
      - 老视频修复/画质提升/画质增强/去模糊
    prefer_over:
      - tool: video-resolution-upscale
        when: 用户泛指画质修复而非明确指定分辨率提升（如"提升到4K"）
      - tool: video-denoise-enhance
        when: 用户说"变清晰"而非仅针对噪点
      - tool: video-framerate-enhance
        when: 用户说"变清晰"而非仅针对帧率
    input:
      - type: video
        count: "1"
      - type: text
        count: "1"
        note: Agent 对视频内容的描述（如"人像自拍视频""演唱会现场录像""动漫片段""夜景拍摄""商品展示视频"），辅助内部场景适配
    output:
      type: video
    constraints:
      - 多场景自动适配，无需手动选择场景类型
      - 本工具不接收 target_resolution 参数，不处理任何分辨率提升/超分诉求
    not_for:
      - 明确分辨率提升（"提升到4K""超分""1080P/2K/4K"） → video-resolution-upscale
      - 明确去噪（"去噪""颗粒感"） → video-denoise-enhance
      - 明确暗部增强（"太暗""提亮"） → video-lowlight-enhance
      - 明确补帧（"补帧""60fps"） → video-framerate-enhance
      - 图片变清晰 → image-superres-enhance
    cli:
      requiredKeys: [video_url, prompt]
      optionalKeys: []
      arrayKeys: []
      commandAliases: [video-quality-enhance, video-quality, video-hd-enhance, video-hd, 视频修复, 视频画质修复, 一键修复]
      inputAliases:
        视频: video_url
        视频url: video_url
        视频链接: video_url
        提示词: prompt
        描述: prompt
        画面描述: prompt
        内容描述: prompt


  - id: video-resolution-upscale
    name: 视频分辨率超分
    summary: 专项视频分辨率超分，支持目标 720P/1080P/2K/4K，仅做像素级分辨率重建，不修复画质。
    description: "Dedicated video resolution super-resolution targeting 720P/1080P/2K/4K, pixel-level reconstruction only without quality repair. `video_url` required; `target_resolution` must be explicitly provided by user (no default), must be higher than original resolution; when user doesn't specify exact value (e.g. \"resolution too low\", \"upscale\"), must ask for target resolution (720P/1080P/2K/4K). Does not handle quality repair without resolution intent, does not process image superres."
    triggers:
      - 超分/分辨率提升/提分辨率/拉高清/升清
      - 提升到720P/1080P/2K/4K/超分辨率
      - 分辨率不够/画面太小/放大变清晰
    input:
      - type: video
        count: "1"
    output:
      type: video
    constraints:
      - target_resolution 必须由用户显式给出，无默认值
      - 目标分辨率必须高于原视频，否则不调用并提示"目标分辨率需高于原视频"
      - 非法值提示"目标分辨率仅支持 720P/1080P/2K/4K"
    not_for:
      - 泛指画质修复（无分辨率关键词） → video-quality-enhance
      - 补帧/流畅度 → video-framerate-enhance
      - 去噪 → video-denoise-enhance
      - 夜景增强 → video-lowlight-enhance
      - 图片超分 → image-superres-enhance
    cli:
      requiredKeys: [video_url, target_resolution]
      optionalKeys: []
      arrayKeys: []
      commandAliases: [video-resolution-upscale, video-resolution, video-superres-enhance, video-superres, 视频超分, 视频分辨率提升, 提升分辨率]
      inputAliases:
        视频: video_url
        视频url: video_url
        视频链接: video_url
        目标分辨率: target_resolution
        分辨率: target_resolution
        目标: target_resolution
      mediaProfileMappings:
        target_resolution:
          mediaInput: video_url
          profileKey: sr_mode
          valueMap:
            720p: 0
            1080p: 1
            2k: 2
            4k: 3


  - id: video-denoise-enhance
    name: 视频去噪
    summary: 去除视频颗粒感/色块/运动噪声，保留画面细节同时降噪。
    description: "Removes video grain/color banding/motion noise. `video_url` required, no `prompt` needed. More severe noise yields more visible results; ineffective for non-noise issues. Prohibited: comprehensive quality repair, video superres, low-light brightening, image denoising, frame interpolation."
    triggers:
      - 去噪/降噪/去杂色/去颗粒/减少噪点
      - 噪点很多/颗粒感太重/画面很脏
      - 噪声/杂讯/ISO太高
    input:
      - type: video
        count: "1"
    output:
      type: video
    not_for:
      - 综合画质修复 → video-quality-enhance
      - 超分 → video-resolution-upscale
      - 夜景暗部提亮 → video-lowlight-enhance
      - 补帧/流畅度 → video-framerate-enhance
      - 图片去噪 → image-denoise-enhance
    cli:
      requiredKeys: [video_url]
      optionalKeys: []
      arrayKeys: []
      commandAliases: [video-denoise-enhance, video-denoise, 视频去噪, 视频降噪]
      inputAliases:
        视频: video_url
        视频url: video_url
        视频链接: video_url


  - id: video-lowlight-enhance
    name: 视频暗部增强
    summary: 视频暗部细节恢复、暗光环境提亮、高光阴影平衡调整。
    description: "Video shadow detail recovery / low-light brightening. `video_url` required, no `prompt` needed. Normal-lighting video may overexpose after processing. Prohibited: comprehensive quality repair, superres, denoising, image low-light enhancement, video color grading."
    triggers:
      - 夜景提升/暗光增强/低照度修复/夜晚提亮
      - 视频太黑/晚上拍得太暗/暗部看不清
      - 视频太暗/暗部增强/夜景视频/光线不足
      - 提亮视频/黑乎乎的视频
    input:
      - type: video
        count: "1"
    output:
      type: video
    constraints:
      - 仅适用于暗光/低照度环境视频，正常光照视频调用可能导致过曝
    not_for:
      - 综合画质修复 → video-quality-enhance
      - 视频去噪 → video-denoise-enhance
      - 超分辨率 → video-resolution-upscale
      - 图片暗部增强 → image-lowlight-enhance
      - 视频调色 → 不支持
    cli:
      requiredKeys: [video_url]
      optionalKeys: []
      arrayKeys: []
      commandAliases: [video-lowlight-enhance, video-lowlight, 视频暗部增强, 视频提亮, 夜景增强]
      inputAliases:
        视频: video_url
        视频url: video_url
        视频链接: video_url


  - id: video-framerate-enhance
    name: 视频补帧
    summary: 视频帧率提升/插帧，让低帧率视频运动更流畅，支持目标24/30/60fps。
    description: "Video frame rate upscaling/interpolation (e.g. 24fps → 60fps). `video_url` required; `frame_rate` (24/30/60, default `60`) optional; illegal values clamped to nearest legal value. Not called when target framerate ≤ original. Prohibited: comprehensive quality repair, superres, denoising, speed change/duration change, editing/stitching."
    triggers:
      - 补帧/插帧/加帧/升帧率/提帧率
      - 让视频更流畅/动作更顺/帧率提升
      - 帧率不够/视频卡顿/提高帧率
      - 60帧/120帧/流畅度
    input:
      - type: video
        count: "1"
    output:
      type: video
    constraints:
      - 目标帧率 24/30/60，默认60，非法值钳位至最近合法值
      - 目标帧率低于或等于原帧率时不调用
      - 视频时长不变，仅帧率提升
    not_for:
      - 综合画质修复 → video-quality-enhance
      - 超分辨率 → video-resolution-upscale
      - 视频去噪 → video-denoise-enhance
      - 变速/慢放 → 不支持
    cli:
      requiredKeys: [video_url]
      optionalKeys: [frame_rate]
      arrayKeys: []
      commandAliases: [video-framerate-enhance, video-framerate, 视频补帧, 补帧, 插帧]
      inputAliases:
        视频: video_url
        视频url: video_url
        视频链接: video_url
        帧率: frame_rate
        目标帧率: frame_rate
        fps: frame_rate


  # ══════════════════════════════════════════
  # ── 视频工具类 ────────────────────────────
  # ══════════════════════════════════════════

  - id: video-to-gif
    name: 视频转GIF
    summary: 将单个视频转换为GIF动图，支持透明底贴纸。
    description: "Converts video to GIF, covering standard GIF (long edge ≤480px) and transparent-background GIF (240×240px); size not customizable. `video_url` and `prompt` required. Outputs transparent GIF when user requests transparent/sticker and video has solid/simple background. Prohibited: image-to-GIF, GIF-to-video, GIF editing, video stitching, video dubbing, video style transformation."
    triggers:
      - 用户要求将视频转为 GIF/动图
      - 用户要求提取视频片段生成 GIF
      - 做表情包/做贴纸/转动图
    input:
      - type: video
        count: "1"
    output:
      type: gif
      note: 等比例，长边最大480px
    params:
      - name: sub_api
        type: enum
        values: [video_to_gif, video_to_gif_transparent]
        default: video_to_gif
        selection_rule: |
          普通GIF/微信表情包 → video_to_gif (api_video_to_gif)（等比例，长边<=480px）
          透明底贴纸/浮动表情包 → video_to_gif_transparent (api_convert_video_to_gif)（固定240x240px）
    constraints:
      - video_to_gif 长边最大 480 像素
      - video_to_gif_transparent 固定 240x240px
      - 仅支持单个视频输入
    not_for:
      - 图片序列合成GIF
      - 视频格式转换（非GIF目标）
    cli:
      requiredKeys: [video_url, prompt]
      optionalKeys: []
      arrayKeys: []
      commandAliases: [视频转gif, 转gif, 做表情包]
      inputAliases:
        video: video_url
        视频: video_url
        提示词: prompt
        描述: prompt
        画面描述: prompt
        内容描述: prompt
        视频url: video_url
        视频链接: video_url


  - id: video-stitch
    name: 视频拼接
    summary: 多段视频顺序拼接，支持纯拼接保留原声或拼接同时自动配乐。
    description: "Sequential multi-segment video stitching, covering plain stitch with original audio and stitch + auto-music. `video_list` (≥2 segments) and `prompt` required; `video_volume` (0–1, default `1`) optional. Does not support specifying specific music URL (requires upper-level orchestration), does not support custom transitions. Prohibited: single video trimming/speed change, narration voiceover, GIF conversion, video style transformation."
    triggers:
      - 拼接视频/合并视频/视频拼在一起
      - 视频合并/多段拼接/视频合集/视频拼一下
      - 拼接配乐/合并加音乐
    input:
      - type: video
        count: "2+"
        note: 至少2段视频URL列表
    output:
      type: video
    params:
      - name: sub_api
        type: enum
        values: [video_stitch, video_stitch_music]
        selection_rule: |
          纯拼接（不需要音乐/保留原声）→ video_stitch (video_stitching)
          拼接+自动配乐（不指定特定音乐）→ video_stitch_music (video_splicing_music)
          指定特定音乐 → 通过 music_url 传入，由 video_stitch_music 通道处理
      - name: video_volume
        type: number
        range: [0, 2.0]
        default: 1
        description: 原视频音量；0 静音、1 原始、>1 增强
      - name: music_url
        type: string
        description: 自定义音乐 URL（可选）；提供时走 video_stitch_music 通道
      - name: canvas_flag
        type: number
        values: [0, 1]
        default: 0
        description: 画布方向标志位
    constraints:
      - 需要至少 2 段视频
      - 不支持自定义转场效果，使用默认硬切拼接
    not_for:
      - 只加背景音乐不拼接 → video-audio-add
      - 只加旁白 → video-audio-add
      - 视频转GIF → video-to-gif
    cli:
      requiredKeys: [video_list, prompt]
      optionalKeys: [video_volume, music_url, canvas_flag]
      arrayKeys: [video_list]
      commandAliases: [video-stitch, 视频拼接, 合并视频, 拼接视频]
      inputAliases:
        视频: video_list
        音乐: music_url
        音频: music_url
        音乐url: music_url
        自定义音乐: music_url
        画布方向: canvas_flag
        画布: canvas_flag
        视频列表: video_list
        视频url: video_list
        视频链接: video_list
        原声音量: video_volume
        音量: video_volume
        提示词: prompt
        描述: prompt
        素材描述: prompt


  - id: video-audio-add
    name: 视频配音
    summary: 为视频添加背景音乐（BGM）或旁白配音，支持两者串联同时添加。
    description: "Adds audio tracks to existing videos, covering BGM (matched music or custom `audio_url`) and narration voiceover; both can be added simultaneously. `video_list` and `prompt` required; `audio_url` (BGM only) optional; `music_volume`/`video_volume` (0–1) default per scenario. Prohibited: video stitching, stitching + auto-music combo, pure music/song generation, video frame editing."
    triggers:
      - 加背景音乐/配个BGM/加个音乐/添加背景音/换背景音乐
      - 加旁白/加配音/配个解说/加个画外音/录个旁白
      - 配音配乐/视频加音频
    input:
      - type: video
        count: "1+"
        note: 视频地址列表
      - type: text
        count: "0..1"
        note: 旁白文案（narration_add时必填）
      - type: audio
        count: "0..1"
        note: 可选自定义音频URL（覆盖素材库BGM）
    output:
      type: video
    params:
      - name: sub_api
        type: enum
        values: [video_audio_add_bgm, video_audio_add_narration]
        selection_rule: |
          添加背景音乐 → video_audio_add_bgm（video_volume默认1，保留原声）
          添加旁白/配音 → video_audio_add_narration（video_volume默认0，压低原声）
          两者都需要 → 串联执行：先 bgm_add 再 narration_add
    constraints:
      - narration_add 时 prompt（旁白文案）必填
      - 有 audio_url 时跳过内部素材检索直接使用
      - BGM 素材 ID 和音色 ID 不作为外部入参，由工具内部根据 prompt 自动检索
    not_for:
      - 生成一首歌 → audio-song-generate
      - 生成纯音乐/背景音乐（不关联视频） → audio-music-generate
      - 拼接视频同时配乐 → video-stitch
      - 视频拼接 → video-stitch
    cli:
      requiredKeys: [video_list, prompt]
      optionalKeys: [audio_url, music_volume, video_volume]
      arrayKeys: [video_list]
      commandAliases: [video-audio-add, video-audio, 视频配音, 配BGM, 加旁白, 加背景音乐]
      inputAliases:
        视频: video_list
        视频列表: video_list
        视频url: video_list
        视频链接: video_list
        旁白: prompt
        文案: prompt
        配音文案: prompt
        提示词: prompt
        旁白文案: prompt
        音频: audio_url
        音频url: audio_url
        自定义音频: audio_url
        音乐音量: music_volume
        bgm音量: music_volume
        原声音量: video_volume
        音量: video_volume


  # ══════════════════════════════════════════
  # ── 证件照类 ──────────────────────────────
  # ══════════════════════════════════════════

  - id: image-id-photo-generate
    name: 证件照生成
    summary: 基于用户照片+证件规格一键生成标准证件照，自动换装换背景，支持合规调整。
    description: "Generates standard ID photos from user portrait + specification, with auto outfit change + background replacement + compliance adjustment. `image_url` (front-facing portrait) and `spec_type` (1-inch/2-inch/passport/ID card/visa/driver's license etc.) required; `bg_color` (white/blue/red etc.) and `attire` (≤15 chars, default black suit + white shirt) auto-adapted per spec. `face_desc` filled based on 13-item observation of original photo, vague words like \"moderate\" or \"medium\" prohibited; retries with simplified prompt on failure, up to 3 rounds. Prohibited: artistic portraits, general image editing, background-only change without outfit, outfit-only change without background, face swap, poster design, auto-adding superres/exact pixels (degrades quality, only when user explicitly requests post-processing)."
    triggers:
      - 证件照/一寸照/二寸照/做个证件照
      - 护照照片/签证照/身份证照/驾照照片
      - 入园照/入学照/毕业证照/考研照/考编照
      - 职业证件照/商务照/形象照/智感证件照
      - 结婚证照/工牌照
    prefer_over:
      - tool: image-portrait-generate
        when: 明确是证件照用途（有规格/底色/合规要求），非艺术写真
      - tool: image-edit
        when: 目标是标准证件照，非通用图片编辑
      - tool: image-background-replace
        when: 需要换装+换背景+合规调整的完整证件照，非单纯换背景
    input:
      - type: image
        count: "1"
        note: 用户正面人像照片
      - type: text
        count: "1"
        note: 证件照规格类型 spec_type
    output:
      type: image
      note: 标准证件照（含换装+换背景+合规调整）
    params:
      - name: sub_api
        type: enum
        values: [image_id_photo_generate]
        default: image_id_photo_generate
        selection_rule: |
          默认 → image_id_photo_generate（image_praline_edit_2）
          单一API，内部通过 prompt 模板 + 规格映射驱动不同证件照类型
    constraints:
      - spec_type 缺失时展示询问模板让用户选择
      - 身份证规格不能穿白衣无外套（与白底冲突），自动改为黑西装
      - 最多迭代 3 轮，超过建议换照片
      - 超分/精确像素为可选后续步骤，非默认执行
    not_for:
      - 艺术写真/非证件照用途 → image-portrait-generate
      - 通用图片编辑 → image-edit
      - 仅换背景不换装 → image-background-replace
      - 仅换装不换背景 → image-outfit-swap
      - 换脸合成 → image-face-swap
      - 海报设计 → image-poster-generate
    cli:
      requiredKeys: [image_url, spec_type]
      optionalKeys: [bg_color, attire]
      arrayKeys: []
      commandAliases: [id-photo, 证件照, 证件照生成, 一寸照, 二寸照]
      inputAliases:
        image: image_url
        图片: image_url
        图片url: image_url
        图片链接: image_url
        照片: image_url
        人像图: image_url
        规格: spec_type
        用途: spec_type
        类型: spec_type
        证件类型: spec_type
        背景色: bg_color
        底色: bg_color
        背景: bg_color
        服装: attire
        衣服: attire
        着装: attire


