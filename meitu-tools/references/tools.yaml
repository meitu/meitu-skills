  - id: video-motion-transfer
    name: 视频动作迁移
    summary: 将参考视频中的人物动作迁移到目标人物/角色上，驱动目标执行相同动作。
    description: "Transfers motion poses from reference video onto image person while preserving appearance. `image_list` (1 person image), `reference_video_list` (1 video, ≤15s), and `prompt` required; `video_duration` (3–15s, default `5`), `aspect_ratio` optional. Requires both person image and motion video with action-mimicking intent. Prohibited: text-only video generation, camera/style reference from video, face/character swap, video content editing."
    triggers:
      - 用户提供动作参考视频，要求目标人物/角色模仿该动作
      - 用户要求"动作迁移"、"动作驱动"、"动作复刻"
    prefer_over:
      - tool: image-to-video
        when: 核心需求是复刻特定动作，而非从图片生成视频或对口型
    input:
      - type: image
        count: "1"
        note: 人物参考图 URL
      - type: video
        count: "1"
        note: 动作参考视频 URL（<=15s）
      - type: text
        count: "1"
        note: 动作/场景描述 prompt
    output:
      type: video
    params:
      - name: sub_api
        type: enum
        values: [video_motion_transfer]
        default: video_motion_transfer
        selection_rule: |
          默认 → video_motion_transfer (video_bonbon_motioncontrol_v26)
          必须同时提供图片+视频且意图为模仿动作
    constraints:
      - 参考视频时长 ≤ 15 秒（超出钳位至15s）
      - 必须同时提供图片和视频
      - 参考视频中需有明显人体动作
    not_for:
      - 人物说话/对口型 → image-to-video
      - 纯文字生成视频 → text-to-video
      - 运镜/风格参考 → video-multimodal-generate
    cli:
      requiredKeys: [image_list, reference_video_list, prompt]
      optionalKeys: [video_duration, aspect_ratio]
      arrayKeys: [image_list, reference_video_list]
      commandAliases: [motion-transfer, video-motion, 视频动作迁移, 动作迁移]
      inputAliases:
        image: image_list
        image_url: image_list
        图片: image_list
        图片url: image_list
        图片链接: image_list
        video: reference_video_list
        video_url: reference_video_list
        视频: reference_video_list
        视频url: reference_video_list
        视频链接: reference_video_list
        提示词: prompt
        描述: prompt
        时长: video_duration
        比例: aspect_ratio
        画幅: aspect_ratio


  - id: image-to-video
    name: 图生视频
    summary: 基于图片生成高保真视频，支持超大动作幅度与精细运镜，具备极强的人物动态一致性与物理规律模拟。
    description: "Generates dynamic videos driven by images, covering single-image generation, multi-image reference fusion (1–9 images), first-last frame transition (1–2 images). `image_list` (1–9) and `prompt` required; `mode` (auto/i2v/mi2v/flf, default `auto`; mode takes priority when mode and model conflict), `model` (auto/toffee/bonbon, default `auto`), `video_duration` (4–15, default 5), `sound` (off/on, default `off`), `aspect_ratio` (default `adaptive`), `multi_shot` (default true) optional. Single image defaults to toffee with bonbon fallback (`aspect_ratio` params silently dropped on fallback); single-image reference intent routes to multi-image fusion; two images default to first-last frame. Other parameters (shot_type / resolution / reference_video_list / reference_audio_list, etc.) are managed internally by the combo-tool and not exposed externally. Prohibited: text-only video generation, motion transfer, audio-driven generation, video editing/modification, applying effects to video, image count >9."
    triggers:
      - 用户提供图片 + 要求人物说话、唱歌、对口型
      - 用户提供图片 + 要求声音与画面原生同步
      - 用户提供图片 + 要求进行复杂的肢体动作（如奔跑、跳舞、大幅度转身等）
      - 用户提供图片 + 要求中高动态画面与明显的运镜控制
      - 用户提供图片 + 需要视频时长达 5-10 秒的长序列生成
    prefer_over:
      - tool: text-to-video
        when: 用户已有明确的视觉主体（图片），且希望视频核心需求是对口型、语言表演
      - tool: video-motion-transfer
        when: 追求创作的自由度，而非严格限定在某个参考视频的动作轨迹内
    input:
      - type: image
        count: "1..9"
        note: 输入图片URL列表（1-9张）
      - type: text
        count: "1"
        note: 视频描述 prompt
    output:
      type: video
      note: 默认含原生音轨（sound 默认 on）
    params:
      - name: mode
        type: enum
        values: [auto, i2v, mi2v, flf]
        default: auto
        selection_rule: |
          显式指定 mode 时优先级高于图片数量/意图推断，直接走对应路径：
          mode=i2v → image_to_video (video_toffee_i2v_v20)，失败兜底 image_to_video_adv (video_bonbon_img2vid_v30)
          mode=mi2v → image_to_video_multi (video_toffee_mi2v_v20)
          mode=flf → image_to_video_frames (video_toffee_flf_v20)
          mode=auto 或不传 → 按图片数量+意图自动决策（见 sub_api selection_rule）
          mode 与 model 同时指定且冲突时，mode 优先
      - name: model
        type: enum
        values: [auto, toffee, bonbon]
        default: auto
        selection_rule: |
          底层模型选择：
          model=toffee → 走 toffee 系列 API（video_toffee_i2v_v20 / video_toffee_mi2v_v20 / video_toffee_flf_v20）
          model=bonbon → 走 video_bonbon_img2vid_v30
          model=auto 或不传 → 按路由规则自动决策
          与 mode 冲突时 mode 优先
      - name: sub_api
        type: enum
        values: [image_to_video, image_to_video_adv, image_to_video_multi, image_to_video_frames]
        default: image_to_video
        selection_rule: |
          mode 显式指定时直接走对应路径（见 mode 参数）
          mode=auto 时按图片数量+意图决策：
          1张图：参考元素/角色/风格 → image_to_video_multi (video_toffee_mi2v_v20)；其他默认 → image_to_video (video_toffee_i2v_v20)，失败兜底 image_to_video_adv (video_bonbon_img2vid_v30)
          2张图：默认走 image_to_video_frames (首尾帧过渡)；用户直接说了要融合/参考时才走 image_to_video_multi (video_toffee_mi2v_v20)
          3-9张图 → image_to_video_multi (video_toffee_mi2v_v20)
          >9张图 → 超出本工具上限
          0张图 → 转 text-to-video
    constraints:
      - combo-tool 对外 sound 默认 off（用户传 on 才开音频）；底层 toffee 通过 generate_audio=BOOL 落库，bonbon 通过 sound=STRING 落库
      - combo-tool 对外 video_duration 默认 5（与 bonbon 一致）；toffee 内部默认 10
      - aspect_ratio 仅 toffee 系列（i2v/mi2v/flf）支持；bonbon 兜底时静默丢弃
      - multi_shot 仅 bonbon 内部生效，对所有路径暴露但 toffee 系列静默忽略
      - shot_type / resolution / reference_video_list / reference_audio_list 由 combo-tool 内部管理，不对外暴露
    not_for:
      - 无首帧图片 → text-to-video
      - 仅需复刻特定参考动作 → video-motion-transfer
      - 有音频输入 → video-multimodal-generate
    cli:
      requiredKeys: [prompt, image_list]
      optionalKeys: [mode, model, aspect_ratio, video_duration, sound, multi_shot]
      arrayKeys: [image_list]
      commandAliases: [video-i2v, 图生视频, i2v]
      inputAliases:
        image: image_list
        image_url: image_list
        图片: image_list
        图片url: image_list
        图片链接: image_list
        提示词: prompt
        描述: prompt
        时长: video_duration
        比例: aspect_ratio
        画幅: aspect_ratio
        宽高比: aspect_ratio
        音频: sound
        音效: sound
        多镜头: multi_shot
        模型: model
        模式: mode


  - id: text-to-video
    name: 文生视频
    summary: 纯文字驱动，生成电影氛围感强、运镜丰富的视频片段，可含环境音。
    description: "Generates dynamic videos from pure text, covering high-quality default mode (4–15s, all ratios, 480p/720p, audio default on) and high-dynamic fast mode (3–15s, 16:9/1:1/9:16 only, 720p, audio default off). `prompt` required; `video_duration`, `sound`, `aspect_ratio`, `resolution` as needed. Prohibited: image-driven video generation, audio-driven generation, video editing, applying effects/style changes to video."
    triggers:
      - 用户无首帧图片，用文字描述期望的视频画面
      - 用户强调氛围感、电影感、运镜美感、音乐节奏感
      - 需求是情绪/展示片段，非完整叙事成片
    prefer_over:
      - tool: image-to-video
        when: 用户未提供首帧图片，且不需要对口型/语音同步
    input:
      - type: text
        count: "1"
        note: 视频描述 prompt
    output:
      type: video
      note: 可含环境音/氛围音
    params:
      - name: sub_api
        type: enum
        values: [text_to_video, text_to_video_fast]
        default: text_to_video
        selection_rule: |
          默认（画质优先）→ text_to_video (video_toffee_t2v_v20)
          切换至 text_to_video_fast (video_bonbon_txt2vid_v30) 条件：
            - 用户明确追求动态效果/画面生动
            - 用户指定"豆包"模型
            - 需要 3s 短时长（toffee 最短 4s）
          ⚠️ 特殊比例(4:3/3:4/21:9/adaptive)和 480p 分辨率需留在默认 text_to_video (toffee)，bonbon 不支持
    constraints:
      - text_to_video 时长 4-15s，默认 10s；比例支持 adaptive/16:9/4:3/1:1/3:4/9:16/21:9；分辨率 480p/720p；音频默认 on
      - text_to_video_fast 时长 3-15s，默认 5s；仅支持 16:9/1:1/9:16；仅 720p；音频默认 off
    not_for:
      - 用户已提供首帧图片 → image-to-video
      - 需对白口播准确 → image-to-video
      - 需所有元素逐条落地或完整广告成片
    cli:
      requiredKeys: [prompt]
      optionalKeys: [video_duration, sound, aspect_ratio, resolution]
      arrayKeys: []
      commandAliases: [video-t2v, 文生视频, t2v]
      inputAliases:
        提示词: prompt
        描述: prompt
        时长: video_duration
        音效: sound
        音频: sound
        比例: aspect_ratio
        画幅: aspect_ratio
        分辨率: resolution


  - id: video-multimodal-generate
    name: 多模态视频
    summary: 支持音频/视频/图片/文字任意组合的多模态混合驱动生成视频。
    description: "Multimodal mixed-driven video generation combining any of audio/video/image/text, suited for music-to-video, camera movement/rhythm reference from video, multi-material mixed generation. `prompt` required; `image_list` (≤9) / `reference_video_list` (≤3, total ≤15s) / `reference_audio_list` (≤3, total ≤15s) at least one multimedia type required (total ≤12); `video_duration` (default `-1` smart), `sound`, `ratio`, `resolution` optional. Prohibited: text-only video generation, image-only video generation (without video or audio), motion transfer."
    triggers:
      - 配合这段音乐/根据音频生成/音频驱动视频
      - 参考这个视频的运镜/模仿运镜/运镜风格参考
      - 结合这些素材生成/综合生成/多素材生成视频
      - 参考节奏/按照这个节奏/节奏同步
    prefer_over:
      - tool: image-to-video
        when: 有音频输入，或仅有视频参考无图片，或素材超过4张图片
      - tool: text-to-video
        when: 有任何多媒体素材输入（非纯文字）
    input:
      - type: text
        count: "1"
        note: 视频描述 prompt
      - type: image
        count: "0..9"
        note: 可选参考图片
      - type: video
        count: "0..3"
        note: 可选参考视频，总时长<=15s
      - type: audio
        count: "0..3"
        note: 可选音频驱动，总时长<=15s
    output:
      type: video
    constraints:
      - 素材总数（图片+视频+音频）合计<=12
      - 至少提供一类多媒体素材（否则转 text-to-video）
    not_for:
      - 纯文字生成视频 → text-to-video
      - 仅图片1-9张生成视频 → image-to-video
      - 动作迁移 → video-motion-transfer
      - 已有视频加特效/改风格 → video-effect-apply
    cli:
      requiredKeys: [prompt, video_duration, ratio]
      optionalKeys: [image_list, reference_video_list, reference_audio_list, sound, resolution]
      arrayKeys: [image_list, reference_video_list, reference_audio_list]
      commandAliases: [multimodal, video-multimodal, 多模态视频, 音频驱动视频]
      inputAliases:
        提示词: prompt
        描述: prompt
        图片: image_list
        参考图: image_list
        参考视频: reference_video_list
        视频: reference_video_list
        运镜参考: reference_video_list
        音频: reference_audio_list
        音乐: reference_audio_list
        时长: video_duration
        音效: sound
        比例: ratio
        画幅: ratio
        分辨率: resolution
      requestPaths:
        sound: generate_audio
        reference_video_list: reference_video_urls
        reference_audio_list: reference_audio_urls


  - id: video-effect-apply
    name: 视频创意生成
    summary: 对已有视频或图片施加创意处理，3 类场景：预设特效（视频）/ AI 创意（图片）/ 长视频转绘，含 2 个内部兜底通道。
    description: "Applies creative effects to existing videos or images, covering preset style effects (video input), AI creative effects (image input only), long-video style redrawing (anime/pixel/clay etc.). `prompt` required; `video_url` or `image_url` per scenario. `effect_id` auto-matched internally based on `prompt`, not an external parameter. Prohibited: video content replacement, video element removal, video quality repair, video canvas expansion, text-only video generation, video stitching."
    triggers:
      - 视频特效/用这个效果/创意玩法/预设风格/加特效
      - AI特效/AI视频创意/AI创意视频
      - 风格转绘/变成动漫风格/像素风格视频/黏土风格视频
    input:
      - type: video
        count: "0..1"
        note: 原视频 URL（预设特效和长视频转绘场景必填）
      - type: image
        count: "0..1"
        note: 图片 URL（AI 创意效果场景必填，无需视频）
      - type: text
        count: "0..1"
        note: prompt（Agent 对所需特效/风格的描述）
    output:
      type: video
    params:
      - name: model
        type: enum
        values: [auto, molasses, bonbon]
        default: auto
        selection_rule: |
          combo-tool 对外暴露的模型选择字段：
          auto（默认）按本卡片路由规则决策（按输入类型 + prompt 信号词分发）
          molasses 显式指定走 video_molasses_edit（视频输入兜底）
          bonbon 显式指定走 video_bonbon_img2vid_v30（图片输入兜底）
      - name: sub_api
        type: enum
        values: [formula_group_v2v_creative, formula_group_video_creative, aiflow_long_video_redrawn, video_molasses_edit, video_bonbon_img2vid_v30]
        selection_rule: |
          【路由铁律】仅图片输入无视频时强制走 formula_group_video_creative；不命中预设 effect_id → 兜底 video_bonbon_img2vid_v30
          视频输入 + 命中预设 effect_id → formula_group_v2v_creative（默认入口）
          视频输入 + 不命中预设 + prompt 命中"动漫/像素/黏土/长视频转绘" → aiflow_long_video_redrawn
          视频输入 + 不命中预设 + 通用特效 → 兜底 video_molasses_edit
          effect_id 不作为外部入参，由工具内部按 prompt 自动检索
    not_for:
      - 视频内容替换 → video-content-replace
      - 视频消除 → video-element-remove
      - 视频画质修复 → video-quality-enhance
      - 视频画布扩展 → video-canvas-expand
      - 视频拼接 → video-stitch
      - 纯文字/图片生成视频 → text-to-video / image-to-video
    cli:
      requiredKeys: [prompt]
      optionalKeys: [video_url, image_url, model]
      arrayKeys: []
      commandAliases: [video-effect, video-generate, 视频特效, 视频创意生成, 风格转绘]
      inputAliases:
        视频: video_url
        视频url: video_url
        视频链接: video_url
        图片: image_url
        参考图: image_url
        人物图: image_url
        提示词: prompt
        描述: prompt
        模型: model


  # ══════════════════════════════════════════
  # ── 视频编辑类 ────────────────────────────
  # ══════════════════════════════════════════

  - id: video-content-replace
    name: 视频内容替换
    summary: 基于文本指令或参考图片，替换/修改视频中的人物、场景、服装等内容元素，保留原始运镜和动作。
    description: "Replaces content elements in videos (characters/scenes/clothing) while preserving original camera work and motion, supporting text-driven and reference-image-driven modes. `video_url` and `prompt` required; `image_url` optional, prioritizes reference-image mode when present. Prohibited: video generation, watermark/subtitle removal, video style transformation, audio modification, video stitching."
    triggers:
      - 视频替换/视频修改/改视频内容/替换视频元素
      - 把视频里的xx改成/把视频背景换成
      - 参考图替换/用这张图替换视频
    input:
      - type: video
        count: "1"
        note: 原视频。参考图模式下须满足：mp4/mov 格式、≤100MB、边长 340-3850px、时长 3-30s、一镜到底、1 人清晰全身
      - type: text
        count: "1"
        note: 修改描述 prompt
      - type: image
        count: "0..1"
        note: 可选参考图（有参考图路由到 content_refimg）
    output:
      type: video
    params:
      - name: sub_api
        type: enum
        values: [video_content_replace_instruct, video_content_replace_refimg]
        selection_rule: |
          无参考图 → video_content_replace_instruct (video_molasses_edit)（文本指令修改）
          有参考图 → video_content_replace_refimg (video_molasses_vidimgs2vid)（参考图替换），image_url 不可访问时降级到 instruct
      - name: model
        type: enum
        values: [auto, molasses]
        default: auto
        selection_rule: |
          combo-tool 对外暴露的模型选择字段：
          auto（默认）按本卡片路由规则决策（按 image_url 是否存在分支到 instruct/refimg）
          molasses 显式指定走 video_molasses_edit / video_molasses_vidimgs2vid（仍按 image_url 分支）
    constraints:
      - video_content_replace_refimg 模式下原视频须满足：mp4/mov、≤100MB、边长 340-3850px、时长 3-30s
      - 返回错误含 "Video duration can not longer than" 时应识别为参考视频时长超限（非生成时长），提示用户裁剪视频而非重试
    not_for:
      - 去水印/字幕 → video-element-remove
      - 视频风格转换 → video-effect-apply
      - 从零生成视频 → image-to-video
      - 给视频换配乐 → video-audio-add
    cli:
      requiredKeys: [video_url, prompt]
      optionalKeys: [image_url, model]
      arrayKeys: []
      commandAliases: [video-content-replace, video-replace, 视频替换, 视频内容替换, 视频修改]
      inputAliases:
        视频: video_url
        视频url: video_url
        视频链接: video_url
        提示词: prompt
        描述: prompt
        修改内容: prompt
        修改描述: prompt
        参考图: image_url
        图片: image_url
        模型: model


  - id: video-element-remove
    name: 视频消除
    summary: 消除视频中的路人/字幕/水印/全部文字，支持多类型组合消除。
    description: "Removes pedestrians/subtitles/watermarks/logos from videos, supports one-click clear-all. `video_url` and `prompt` required. Subtitle and watermark removal can run in parallel; clear-all is mutually exclusive with subtitle/watermark (clear-all includes both); clear-all requires secondary confirmation. Prohibited: adding logos/watermarks, video content replacement, image watermark removal, video quality enhancement."
    triggers:
      - 去路人/去行人/消除行人
      - 去字幕/去台词字幕
      - 去水印/去角标/去Logo/消除平台标
      - 清屏/所有文字/全部字/纯净画面
    input:
      - type: video
        count: "1"
    output:
      type: video
    params:
      - name: sub_api
        type: enum
        values: [video_element_remove_people, video_element_remove_subtitle, video_element_remove_watermark, video_element_remove_alltext]
        selection_rule: |
          路人/行人 → video_element_remove_people (video_content_remove)
          字幕（随时间变化）→ video_element_remove_subtitle (video_subtitle_remove)
          水印/Logo/角标（固定位置）→ video_element_remove_watermark (video_watermark_remove)
          一键清屏（所有文字）→ video_element_remove_alltext (video_allwords_remove)（强制二次确认）
          字幕+水印可同时调用；alltext 与其他互斥
    constraints:
      - video_element_remove_alltext 执行前必须获得用户二次确认
      - subtitle_remove 与 video_element_remove_watermark 可同时调用
    not_for:
      - 添加Logo/水印 → video-logo-add
      - 视频内容替换 → video-content-replace
      - 图片去水印 → image-element-remove
    cli:
      requiredKeys: [video_url, prompt]
      optionalKeys: []
      arrayKeys: []
      commandAliases: [video-element-remove, video-remove, 视频消除, 视频去水印, 视频去字幕, 视频去路人]
      inputAliases:
        视频: video_url
        视频url: video_url
        视频链接: video_url
        提示词: prompt
        描述: prompt
        画面描述: prompt


  - id: video-canvas-expand
    name: 视频扩展
    summary: 将视频画面按方向 outpainting 扩展，AI 智能补全扩展区域，由 prompt 指引补全内容、expand_ratio 控制扩展幅度、directions 指定扩展方向。
    description: "Expands video frames outward (outpainting) with AI-filled extended areas. `video_url` and `prompt` required; `expand_ratio` (0~0.5, default 0.3) controls expansion magnitude per side; `directions` (any combo of left/right/up/down, default `left,right,up,down`) controls which sides to expand. Prohibited: video content editing, video duration extension, video cropping/shrinking, image expansion."
    triggers:
      - 扩展视频/视频扩图/扩展画面/视频outpainting
      - 把画面往左/右/上/下扩
      - 给视频补画面/扩出更多背景
      - 视频画布扩展/让视频画面更宽
    input:
      - type: video
        count: "1"
      - type: text
        count: "1"
        note: prompt 描述扩展区域要补什么内容
    output:
      type: video
    params:
      - name: expand_ratio
        type: string
        range: "0 ~ 0.5"
        default: "0.3"
        selection_rule: |
          每条边扩展比例（占原边长的比值），值在 0~0.5 之间。默认 0.3。值越大扩展面积越大、AI 补全难度越高
      - name: directions
        type: string
        values: [left, right, up, down]
        default: "left,right,up,down"
        selection_rule: |
          扩展方向，可选 left/right/up/down 任意组合（逗号分隔）。默认四方向全扩。
          单方向：如 "right"
          双方向：如 "left,right" / "up,down"
          四方向：默认 "left,right,up,down"
    constraints:
      - 仅扩展画面不延长时长
      - 不支持裁剪/缩小
      - expand_ratio 越界（>0.5）→ 截断至 0.5
      - directions 含非法值 → 回退至默认四方向
    not_for:
      - 图片扩展 → image-transform (canvas_extend)
      - 视频内容编辑 → video-content-replace
      - 视频裁剪/缩小 → 不支持
    cli:
      requiredKeys: [video_url, prompt]
      optionalKeys: [expand_ratio, directions]
      arrayKeys: []
      commandAliases: [video-canvas-expand, video-expand, 视频扩展, 视频扩图, 视频画布扩展]
      inputAliases:
        视频: video_url
        视频url: video_url
        视频链接: video_url
        提示词: prompt
        描述: prompt
        补全描述: prompt
        扩展比例: expand_ratio
        扩展幅度: expand_ratio
        ratio: expand_ratio
        方向: directions
        扩展方向: directions


