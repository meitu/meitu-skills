    description: "Dual-image face/head swap compositing, replacing source face onto target scene image. `head_image_url` (face source), `sence_image_url` (scene base), and `prompt` required; prompts for supplement if fewer than 2 images, takes first 2 if more. \"Use B's face on A\" semantically assigns B=head, A=scene. Prohibited: video face swap, multi-person simultaneous face swap, outfit swap, portrait generation/hairstyle adjustment."
    triggers:
      - 提供两张人像图，要求换脸/换头
