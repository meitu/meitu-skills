          文字文档/扫描件 → image_superres_enhance_document (api_v1_dlbeautytextimagesr_async)
          其他/未指定 → image_superres_enhance (api_v2_image_restoration_async)（默认）
          失败 → 重试1次 → 降级至 image_superres_enhance (api_v2_image_restoration_async) → 仍失败降级至 image-edit
    not_for:
