# ============================================================
# cli-tools-all.yaml — 全量工具 CLI 注册表 (SSOT)
#
# 说明：
#   本文件包含所有 DAG 卡片对应的 CLI 工具定义，共 40 个工具（已忽略 image-color-enhance 与 image-mosaic-apply）。
#   基于 cli-tools-all0417.yaml，同步当前 CLI 2.0.6 可用命令集。
#   覆盖图片搜索(1)、图片生成(4)、图片创意(1)、图片编辑(10)、
#   图片工具(2)、图片增强(2)、图片变换(1)、文本/代码(3)、
#   视频生成(5)、视频编辑(4)、视频增强(5)、视频工具(3)、
#   音频(2) 四大域。
#   格式与 tools.yaml 完全一致，可直接合并或独立使用。
#
# 字段说明（同 tools.yaml）：
#   summary        — 一句话功能描述(<=40字)
#   triggers       — 触发条件列表
#   prefer_over    — 与哪些工具容易混淆，选当前工具的判断条件
#   input          — 输入规格
#   output         — 输出规格
#   params         — 额外参数(如子模型选择)，无则省略
#   constraints    — 硬性约束/前置依赖，无则省略
#   not_for        — 不适用场景 + 应转向的工具
#   cli            — CLI 注册表数据
#     command          — 实际 CLI 命令名（省略则用 id）
#     requiredKeys     — 必填输入键
#     optionalKeys     — 可选输入键
#     arrayKeys        — 值为数组的键
#     commandAliases   — 命令别名
#     inputAliases     — 输入键别名映射
# ============================================================

tools:

  # ══════════════════════════════════════════
  # ── 音频类 ────────────────────────────────
  # ══════════════════════════════════════════

  - id: audio-music-generate
    name: 纯音乐生成
    summary: 纯音乐/BGM生成，无人声无歌词，支持多种风格和时长控制（30-120秒）。
    description: "Generates vocal-free, lyric-free pure music / BGM for background music, ambient mood, and emotional scoring, duration 30–120 seconds. `prompt` required; `duration` required, defaults to `30` seconds if not provided, auto-clamped to 30–120 seconds with notification. Suited for ambient/mood/background pure music, not for strong-rhythm or full song structures. Prohibited: songs with vocals/lyrics, strong-rhythm/high-variation instrumental music, adding audio to existing videos, structured song creation, audio editing."
    triggers:
      - 生成BGM/配乐/纯音乐/背景音乐
      - 做个音乐垫/轻音乐/伴奏/器乐/氛围音乐
      - 无人声音乐/钢琴曲/电子乐/爵士乐
    prefer_over:
      - tool: audio-song-generate
        when: 明确要求纯音乐/无人声/无歌词，且非强节奏/强变化需求
    input:
      - type: text
        count: "1"
        note: 纯音乐描述（主题/风格/场景/情绪）
    output:
      type: audio
      note: 纯音乐文件，30-120秒
    constraints:
      - 时长范围 30-120 秒，超出自动钳位
      - 不支持输出超过 120s
    not_for:
      - 含人声的完整歌曲 → audio-song-generate
      - 强节奏/强变化/完整编曲感的纯音乐 → audio-song-generate
      - 为已有视频添加音频 → video-audio-add
    cli:
      requiredKeys: [prompt, duration]
      optionalKeys: []
      arrayKeys: []
      commandAliases: [music, bgm, audio-music, 纯音乐生成, 背景音乐]
      inputAliases:
        提示词: prompt
        描述: prompt
        风格: prompt
        场景: prompt
        时长: duration
        秒: duration
      requestPaths:
        prompt: text


  - id: audio-song-generate
    name: 歌曲生成
    summary: 歌词驱动的完整歌曲生成（含人声），也支持强节奏/完整编曲感的纯音乐。
    description: "Lyrics-driven complete song generation (with vocals), also supports strong-rhythm/full-arrangement instrumental music. `prompt` (style description) required; `prompt_lyrics` (lyrics) required for vocal songs, can be empty for instrumental; `model` (auto/mureka-6/mureka-7.5/mureka-o1, default `auto`) optional. When `prompt` conflicts with `prompt_lyrics` style, `prompt` takes priority. Prohibited: plain ambient BGM/background music, generating lyrics text only, albums over 5 minutes, dubbing/scoring for existing videos."
    triggers:
      - 写首歌/创作歌曲/生成一首歌/帮我作曲
      - 带歌词的音乐/做首歌/歌曲创作
      - 品牌歌曲/作词作曲/编曲配唱/唱一首
    prefer_over:
      - tool: audio-music-generate
        when: 需要人声/歌词/完整歌曲结构，或强节奏/强变化/完整编曲感的纯音乐
    input:
      - type: text
        count: "1"
        note: 歌曲风格描述 prompt
      - type: text
        count: "1"
        note: 歌词内容 prompt_lyrics
    output:
      type: audio
      note: 含人声的完整歌曲
    params:
      - name: model
        type: enum
        values: [auto, mureka-6, mureka-7.5, mureka-o1]
        default: auto
        selection_rule: |
          生成模型选择：auto 由系统自动决策；非法值回退至 auto
    not_for:
      - 普通纯音乐/BGM/背景配乐（非强节奏） → audio-music-generate
      - 为已有视频添加音频 → video-audio-add
      - 只写歌词不要旋律 → 不属于本工具范围
    cli:
      requiredKeys: [prompt, prompt_lyrics]
      optionalKeys: [model]
      arrayKeys: []
      commandAliases: [song, audio-song, 歌曲生成, 写歌, 作曲]
      inputAliases:
        风格: prompt
        提示词: prompt
        描述: prompt
        风格描述: prompt
        歌词: prompt_lyrics
        歌词内容: prompt_lyrics
        模型: model
      requestPaths:
        prompt_lyrics: lyrics


  # ══════════════════════════════════════════
  # ── 图片搜索类 ────────────────────────────
  # ══════════════════════════════════════════

  - id: image-search
    name: 文搜图
    summary: 关键词搜图/以图搜图，内部图库+Pinterest联合检索，找参考图/素材/灵感。
    description: "Keyword image search / reverse image search with internal library + Pinterest joint retrieval. `prompt` (search term array) and `image_ids` (image ID array) at least one required; `query_mode` (search/retrieve, default `search`), `size` (1–20, default `4`), `source_type` (auto/internal/pinterest, default `auto`) required. Retries with synonyms when empty, returns not-found if still empty. Prohibited: image generation/AI creation, image editing/modification, video search, OCR/image understanding."
    triggers:
      - 搜图/找参考图/找素材/搜几张
      - 找类似的图/以图搜图/帮我搜/找图片
    input:
      - type: text
        count: "0+"
        note: 搜索关键词数组（search模式必填）
      - type: image
        count: "0+"
        note: 参考图ID（retrieve模式必填）
    output:
      type: image
      note: 图片列表，默认返回4张
    constraints:
      - prompt 和 image_ids 至少提供一项
      - 最多返回 20 张
    not_for:
      - 图片生成/AI创作 → text-to-image
      - 图片编辑/修改 → image-edit
    cli:
      requiredKeys: []
      optionalKeys: [prompt, image_ids, query_mode, size, source_type]
      arrayKeys: [prompt, image_ids]
      commandAliases: [search, 搜图, 文搜图, 找图]
      inputAliases:
        关键词: prompt
        搜索词: prompt
        搜索: prompt
        描述: prompt
        图片id: image_ids
        参考图id: image_ids
        模式: query_mode
        查询模式: query_mode
        数量: size
        返回数量: size
        来源: source_type
        数据源: source_type


  # ══════════════════════════════════════════
  # ── 图片生成类 ────────────────────────────
  # ══════════════════════════════════════════

  - id: text-to-image
    name: 图片生成
    summary: 从文字描述（文字驱动）生成全新图片，支持通用创意生成与商业级高品质生成。
    description: "Generates brand-new images from text descriptions from scratch (no base image); reference images serve only as style/mood supplements, not as content subjects. Covers general text-to-image/multi-image reference fusion and commercial-grade high-quality generation, supports generating images at specified resolution (e.g. 4K wallpaper). `prompt` required; `model` (auto/gummy/praline_pro, default `auto`), `size` (1K/2K/4K, default `2K`), `ratio` and `image_list` optional. `image_list` and `ratio` are mutually exclusive — `ratio` not supported when `image_list` is provided. `output_format` is managed internally by the combo-tool and not exposed externally. Prohibited: editing existing images, reference-image-driven creation (reference image as primary content source), portraits/pet photos/ID photos, poster/banner layout design, style transfer/preset effects, video generation, image search, quality enhancement/superres of existing images."
    triggers:
      - 无底图，纯文字从零生图
      - 新图中需包含指定文字
      - 商业级/电商/宣传/封面图生成
      - 写实/电影截图风格图片
    prefer_over:
      - tool: image-edit
        when: 核心意图是生成新图，而非修改现有图片
      - tool: image-poster-generate
        when: 目标不是海报/宣传物料
    input:
      - type: text
        count: "1"
        note: 生成描述 prompt
      - type: image
        count: "0+"
        note: 可选参考图 URL 数组
    output:
      type: image
    params:
      - name: model
        type: enum
        values: [auto, gummy, praline_pro]
        default: auto
        selection_rule: |
          model 为 sub_api 的外部别名；auto 或不传时按 sub_api selection_rule 路由：
          gummy       → text_to_image (image_gummy_generate)
          praline_pro → text_to_image_praline (image_praline_create_v2)
          指定 model 调用失败时，仍按 sub_api 降级链继续重试
      - name: sub_api
        type: enum
        values: [text_to_image, text_to_image_praline]
        default: text_to_image
        selection_rule: |
          有 image_list（参考图融合）→ text_to_image (image_gummy_generate)  ⚠️ praline 不支持 image_list
          商业级/宣传/电商/文字渲染/写实/电影截图风格 → text_to_image_praline (image_praline_create_v2)
          创意/插画/概念/风格混搭/通用 → text_to_image (image_gummy_generate)
          text_to_image_praline 失败 → 降级至 text_to_image
    constraints:
      - size 指定不支持值 → 回退至默认 2K
      - image_list 仅 text_to_image (gummy) 支持，praline 不支持参考图输入
      - output_format 由 combo-tool 内部管理，不对外暴露
    not_for:
      - 对已有图片局部修改 → image-edit
      - 参考图驱动的创作（参考图是主要内容来源） → image-edit
      - 海报设计（含排版） → image-poster-generate
      - 换脸 → image-face-swap
    cli:
      requiredKeys: [prompt]
      optionalKeys: [image_list, size, ratio, model]
      arrayKeys: [image_list]
      commandAliases: [generate, image-generate, 图片生成, 文生图]
      inputAliases:
        image: image_list
        image_url: image_list
        参考图: image_list
        参考图片: image_list
        提示词: prompt
        描述: prompt
        尺寸: size
        分辨率: size
        比例: ratio
        宽高比: ratio
        模型: model


  - id: image-poster-generate
    name: 海报生成
    summary: 生成含文字排版的海报，支持中文与非中文，适用于宣传/广告/活动推广。
    description: "Generates brand-new posters with layout, supporting pure text description or product/portrait images as material input, multiple styles and sizes. `prompt` required; `model` (Gummy/Nougat/PralineV2/GummyV4.5/Praline_2, default `Praline_2`), `image_list`, `ratio` (default `auto`), `size` (default `auto`), `output_format` (default `png`), `enhance_prompt` optional. Model selection: default Praline_2, realistic portrait GummyV4.5, high-creativity PralineV2, general portrait Gummy, special style Nougat. Prohibited: secondary editing of existing posters (change background/text/elements/size), general image editing, pure image generation without layout needs, video/animated posters, general text editing outside poster context."
    triggers:
      - 生成海报/宣传图/广告图
      - 基于图片生成海报
      - 生成系列海报
    prefer_over:
      - tool: text-to-image
        when: 输出物明确是海报/宣传物料，需文字排版和版式
      - tool: image-edit
        when: 无任何参考图/底图，从零纯文字生成全新海报版面
    input:
      - type: text
        count: "1"
        note: 海报内容/设计要求 prompt
      - type: image
        count: "0+"
        note: 可选素材图
    output:
      type: image
      note: 每次仅1张
    params:
      - name: model
        type: enum
        values: [Gummy, Nougat, PralineV2, GummyV4.5, Praline_2]
        default: Praline_2
        selection_rule: |
          默认/综合 → Praline_2
          写实人像 → GummyV4.5
          高创意 → PralineV2
          通用人像 → Gummy
          特殊风格 → Nougat
    constraints:
      - 每次仅输出1张
      - 中文与非中文自动适配不同模型
    not_for:
      - 通用图片生成（非海报） → text-to-image
      - 非海报图片编辑 → image-edit
    cli:
      requiredKeys: [prompt]
      optionalKeys: [model, image_list, size, ratio, output_format, enhance_prompt, enhance_template]
      arrayKeys: [image_list]
      commandAliases: [poster, image-poster, 海报生成, 做海报]
      inputAliases:
        image: image_list
        图片: image_list
        素材图: image_list
        提示词: prompt
        描述: prompt
        模型: model
        尺寸: size
        分辨率: size
        比例: ratio
        画幅: ratio
        格式: output_format
        输出格式: output_format


  - id: image-portrait-generate
    name: 写真生成
    summary: 人像/宠物写真生成、双人合影合成，高精度人像保真，支持形象照/艺术照。
    description: "Generates high-fidelity portraits from reference images (person/pet), covering portrait generation (ID photo/professional headshot/artistic photo/pet portrait/group photo/hairstyle adjustment) and dual-person composite/group photo synthesis. `image_list` (1–N person/pet images) and `prompt` required; `size` (2K/4K, default `2K`) optional. Local editing (makeup/face/posture changes) is not in this tool's scope. Prohibited: face swap/head swap, style transfer/creative effects, outfit swap, video generation, text-only generation without reference images."
    triggers:
      - 写真/形象照/艺术照/宠物写真
      - 发型调整/试发型
      - 合影/合照/双人合照/多人写真/团体照
    prefer_over:
      - tool: text-to-image
        when: 需要高精度人像保真的写真效果
      - tool: image-edit
        when: 目标是写真生成而非通用编辑
    input:
      - type: image
        count: "1+"
        note: 人像/宠物图片URL数组
      - type: text
        count: "1"
        note: 写真描述 prompt
    output:
      type: image
    params:
      - name: sub_api
        type: enum
        values: [image_portrait_generate, image_portrait_generate_fallback, image_portrait_generate_group]
        default: image_portrait_generate
        selection_rule: |
          双人合影信号 + 恰好2张图 → image_portrait_generate_group (image_groupphoto2_edit)
            ┗ prompt 映射为 instruction；固定参数 lora_key: multi_duorenhezhao_2k, rsp_media_type: url
          单人/宠物写真 → image_portrait_generate (image_gummy_edit_v45)（失败降级 image_portrait_generate_fallback (image_mint_portrait_edit_2k)）
          多人(3+)写真 → image_portrait_generate (image_gummy_edit_v45)（失败不降级，直接返回错误）
          意图不明 + 2张图 → 默认走 image_portrait_generate (image_gummy_edit_v45)（单人写真），不追问
    constraints:
      - 双人合影需恰好 2 张人像图
      - image_portrait_generate_group 非中英文 prompt 自动翻译为中文
    not_for:
      - 换脸/换头合成 → image-face-swap
      - 换装/试穿 → image-outfit-swap
      - 无参考图纯文字生成 → text-to-image
      - 风格迁移/创意效果 → image-style-transfer
    cli:
      requiredKeys: [image_list, prompt]
      optionalKeys: [size]
      arrayKeys: [image_list]
      commandAliases: [portrait, image-portrait, 写真生成, 形象照, 合影]
      inputAliases:
        image: image_list
        image_url: image_list
        图片: image_list
        人像图: image_list
        照片: image_list
        参考图: image_list
        提示词: prompt
        描述: prompt
        尺寸: size
        分辨率: size


  # ══════════════════════════════════════════
  # ── 图片编辑类 ────────────────────────────
  # ══════════════════════════════════════════

  - id: image-edit
    name: 图片编辑
    summary: 对已有图片编辑或基于参考图创作全新图片，支持电商产品出图/人像/多图一致性/通用编辑/参考图创作五类场景。
    description: "Edits existing images or creates new images based on existing images (must have base image), covering 5 scenarios: e-commerce product imaging (white-background hero/scene/multi-angle/promotional text), portrait editing (face/makeup/hairstyle/pose), multi-image consistency editing (product fine-tuning/multi-image fusion/text content replacement), general editing (replace elements/add elements/adjust composition/background modification), reference-image creation (reference image as primary content source). `image_list` and `prompt` required; when adding/rendering text onto images, text content is kept as user's original wording without translation. In design contexts, \"IP\" refers to character/mascot/brand imagery patterns—`prompt` should preserve \"pattern/character\" semantics."
    triggers:
      - 电商主图/白底图/产品展示图/场景图/商品图/多角度展示图
      - 修改现有图片局部内容（换背景、改颜色、去除/添加元素）
      - 多张图提取材质/风格/构图融合
      - 在现有图片上渲染文字
      - 图片分析或标注
      - 将人物/宠物照片转为卡通、3D手办、二次元等艺术风格
      - 人像/宠物写真生成、发型调整
      - 基于参考图创作全新图片（创意视觉稿等，非海报）
    prefer_over:
      - tool: text-to-image
        when: 用户有明确底图要编辑，非从零生图
      - tool: image-poster-generate
        when: 有参考图/底图的海报编辑、电商产品展示页版式设计、已有海报二次修改（改字/换色/换背景）
    input:
      - type: image
        count: "1+"
        note: 至少一张底图，可追加参考图
      - type: text
        count: "1"
        note: 编辑指令 prompt
    output:
      type: image
    params:
      - name: model
        type: enum
        values: [auto, gummy_pro, praline_pro, praline_lite, mint_edit]
        default: auto
        selection_rule: |
          model 为 sub_api 的外部别名；auto 或不传时按 sub_api selection_rule 路由：
          gummy_pro    → image_edit_portrait (image_gummy_edit_v45)
          praline_pro  → image_edit_praline / image_edit (image_praline_edit_v2)
          praline_lite → image_edit_lite (image_praline_edit_2)
          mint_edit    → image_edit_fallback (image_mint_edit)
          指定 model 调用失败时，仍按 sub_api 降级链继续重试。
      - name: sub_api
        type: enum
        values: [image_edit, image_edit_portrait, image_edit_praline, image_edit_lite, image_edit_fallback]
        default: image_edit
        selection_rule: |
          前置判断 0：有产品图 + 电商出图意图（白底图/主图/场景图/产品展示图）→ image_edit_praline (image_praline_edit_v2)（电商产品出图）；含海报/Banner 版式设计意图时让给海报专科工具
          前置判断 A：有参考图 + 生成全新图片意图（非就地编辑）→ image_edit_praline (image_praline_edit_v2)（参考图创作）；含海报/宣传图/Banner 关键词时让给海报专科工具
          优先级：电商前置 > 参考图创作前置 > 多图 > 人像 > 高一致性 > 通用
          人像编辑（人脸/表情/妆容/美颜/发型/姿态/肤色）→ image_edit_portrait (image_gummy_edit_v45)
          高一致性/多图融合/文字渲染（商品图/IP角色/保持一致/多图融合/加文字）→ image_edit_praline (image_praline_edit_v2)
          通用编辑 → image_edit (image_praline_edit_v2)
          image_edit_portrait 失败 → 降级至 image_edit (image_praline_edit_v2)
          image_edit 失败 → 降级至 image_edit_lite (image_praline_edit_2)
          image_edit_lite 失败 → 降级至 image_edit_fallback (image_mint_edit)
    constraints:
